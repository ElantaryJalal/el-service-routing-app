services:
  db:
    image: postgis/postgis:16-3.4
    container_name: el_service_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-el_service}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-el_service}
      POSTGRES_DB: ${POSTGRES_DB:-el_service}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-el_service} -d ${POSTGRES_DB:-el_service}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
