services:
  db:
    image: postgis/postgis:16-3.4
    container_name: el_service_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-el_service}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-el_service}
      POSTGRES_DB: ${POSTGRES_DB:-el_service}
    # Host port defaults to 5432; override POSTGRES_HOST_PORT (e.g. 5433) if
    # another Postgres already occupies 5432. Keep DATABASE_URL in sync.
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-el_service} -d ${POSTGRES_DB:-el_service}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # OSRM routing engine (MLD pipeline, car profile).
  # Requires pre-processed data in $OSRM_DATA_DIR — see README.md ("Data prep").
  # OSRM_FILE is the base name of the .osrm dataset (default: region).
  # OSRM_DATA_DIR overrides the host data directory (e.g. a WSL-native path
  # for large country-wide datasets that don't fit on the Windows drive).
  osrm:
    image: osrm/osrm-backend:latest
    container_name: el_service_osrm
    command: >
      osrm-routed --algorithm mld --max-table-size 2000
      /data/${OSRM_FILE:-region}.osrm
    volumes:
      - ${OSRM_DATA_DIR:-./osrm-data}:/data
    ports:
      - "${OSRM_HOST_PORT:-5000}:5000"
    restart: unless-stopped

  # Vroom optimisation server (vroom-express) routing via the osrm service.
  vroom:
    image: vroomvrp/vroom-docker:v1.13.0
    container_name: el_service_vroom
    environment:
      VROOM_ROUTER: osrm
    volumes:
      - ./vroom-conf:/conf
    ports:
      - "${VROOM_HOST_PORT:-3000}:3000"
    depends_on:
      - osrm
    restart: unless-stopped

volumes:
  pgdata:
